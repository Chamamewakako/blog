<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="icon" type="image/x-icon" href="/blog/assets/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/blog/assets/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/blog/assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <div class="header-image-wrap">

              padding:13px 32px;
              border: 1px solid rgba(139,100,0,0.45);
              font-family:'Cinzel',serif;
              font-size:11px; letter-spacing:0.35em;
