<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+JP:wght@300;400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
  <div class="header-image-wrap">
    <img src="{{ '/assets/Header_Lantern.png' | relative_url }}" 
         alt="図書館とランタン" 
         class="header-img">
    <div class="header-inner">
      <span class="header-eyebrow">Sway, Sway, Lantern of Thought.Light up the compass<br>within your Heart.</span>
      <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
      <p class="site-desc">{{ site.description }}</p>
    </div>
  </div>
</header>


  <main class="main-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>© Chamamewakako · <a href="{{ '/' | relative_url }}">記事一覧</a>

  </footer>
</body>
</html>
