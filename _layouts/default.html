<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="icon" type="image/x-icon" href="/blog/assets/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/blog/assets/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/blog/assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+JP:wght@300;400&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
  <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
  <div class="header-image-wrap">
    <img src="{{ '/assets/Header_Lantern.png' | relative_url }}" 
         alt="図書館とランタン" 
         class="header-img">
  </div>
  <p class="site-desc">{{ site.description }}</p>
</header>

  <main class="main-content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>© Chamamewakako · <a href="{{ '/' | relative_url }}">記事一覧</a>

  </footer>
</body>
</html>
